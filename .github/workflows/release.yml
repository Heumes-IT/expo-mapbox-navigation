name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Publish to npm
        run: |
          TAG=$(echo "${{ github.ref_name }}" | grep -q 'beta\|alpha\|rc' && echo "beta" || echo "latest")
          npm publish --tag $TAG --access public
        env:
          NPM_CONFIG_PROVENANCE: true  

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
