name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test

      - name: Publish to npm
        run: |
          TAG=$(echo "${{ github.ref_name }}" | grep -q 'beta\|alpha\|rc' && echo "beta" || echo "latest")
          npm publish --tag $TAG --provenance --access public

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
